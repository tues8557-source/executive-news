<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>행정부 카드 뉴스</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">이 카드뉴스는 어느 부처의 소식일까요?</p>
        <h1>행정부 카드 뉴스</h1>
      </div>
      <div class="header-actions">
        <nav class="header-links" aria-label="외부 링크">
          <a class="source-link" href="https://www.korea.kr/multi/visualNewsList.do" target="_blank" rel="noreferrer">카드뉴스 원본</a>
          <a class="source-link org-link" href="https://www.gov.kr/portal/orgInfo" target="_blank" rel="noreferrer">중앙행정기관 조직도</a>
        </nav>
        <div class="filter-hint" aria-hidden="true">필터 버튼으로 행정 부처를 선택하세요.</div>
      </div>
    </header>

    <main>
      <section class="toolbar" aria-label="페이지 이동">
        <div class="toolbar-nav" role="group" aria-label="페이지 이동 컨트롤">
          <button class="icon-button" id="firstPage" type="button" aria-label="첫 페이지">|&lt;</button>
          <button class="icon-button" id="prevPage" type="button" aria-label="이전 페이지">&lt;</button>
          <div class="page-jump" id="pageJump" aria-live="polite">
            <input id="pageInput" type="hidden" value="1">
            <button class="page-picker-trigger" id="pagePickerTrigger" type="button" aria-label="페이지 선택" aria-expanded="false" aria-controls="pagePicker">
              <span class="page-current" id="pageCurrent">1</span>
              <span class="page-total-wrap">
                <span id="pageTotal">/ 1쪽</span>
              </span>
            </button>
          </div>
          <button class="icon-button" id="nextPage" type="button" aria-label="다음 페이지">&gt;</button>
          <button class="icon-button" id="lastPage" type="button" aria-label="마지막 페이지">&gt;|</button>
        </div>
        <div class="toolbar-meta">
          <div class="status-shell">
            <span class="status-dot" aria-hidden="true"></span>
            <div class="status" id="status" role="status">불러오는 중</div>
          </div>
          <button class="filter-trigger" id="filterTrigger" type="button" aria-expanded="false" aria-controls="filterOptions">필터</button>
        </div>
      </section>

      <section class="gallery" id="gallery" aria-label="카드뉴스 목록"></section>
      <div class="scroll-sentinel" id="scrollSentinel" aria-hidden="true"></div>
    </main>

    <div class="filter-options" id="filterOptions" hidden>
      <label><input type="checkbox" value="ministry" checked> 부</label>
      <label><input type="checkbox" value="office"> 처</label>
      <label><input type="checkbox" value="agency"> 청</label>
      <label><input type="checkbox" value="committee"> 위원회</label>
      <label class="filter-option-stacked">
        <span><input type="checkbox" value="other"> 기타</span>
        <small>국무조정실, 문화체육관광부 국민소통실 등</small>
      </label>
    </div>

    <div class="page-picker-menu" id="pagePicker" hidden>
      <div class="page-picker-grid" id="pagePickerGrid" role="listbox" aria-label="페이지 선택"></div>
    </div>

    <div class="viewer" id="viewer" aria-hidden="true">
      <button class="viewer-close" id="closeViewer" type="button" aria-label="닫기">x</button>
      <button class="viewer-nav viewer-prev" id="viewerPrev" type="button" aria-label="이전 카드">&lt;</button>
      <figure class="viewer-frame">
        <div class="viewer-media" id="viewerMedia">
          <img id="viewerImage" alt="">
        </div>
        <figcaption class="viewer-caption">
          <div>
            <p id="viewerTitle"></p>
            <span id="viewerDate"></span>
          </div>
          <button class="viewer-mask" id="viewerMask" type="button"></button>
        </figcaption>
      </figure>
      <button class="viewer-nav viewer-next" id="viewerNext" type="button" aria-label="다음 카드">&gt;</button>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
